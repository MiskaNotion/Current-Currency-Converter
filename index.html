<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:ui-serif, Georgia, Cambria, "Times New Roman", serif;
}

body{
    background:transparent;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.converter{
    width:100%;
    max-width:650px;
    background:white;
    border:1px solid #e5e5e5;
    border-radius:20px;
    overflow:hidden;
}

.header{
    background:#37352f;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.content{
    padding:30px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:15px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:1px solid #d9d9d9;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f1f1ef;
    cursor:pointer;
    margin-bottom:20px;
    font-size:16px;
}

.result-box{
    background:#f7f7f5;
    border-radius:14px;
    padding:25px;
    text-align:center;
}

.rate{
    color:#666;
    margin-bottom:10px;
    font-size:12px;
}

.result{
    font-size:38px;
    font-weight:bold;
    color:#37352f;
}

.updated{
    margin-top:6px;
    font-size:10px;
    color:#888;
}
</style>

</head>

<body>

<div class="converter">

<div class="header">
Currency Converter
</div>

<div class="content">

<label>Amount</label> <input type="number" id="amount" value="100">

<label>From Currency</label> <select id="from"></select>

<label>To Currency</label> <select id="to"></select>

<button onclick="swapCurrencies()">
⇅ Swap Currencies
</button>

<div class="result-box">
<div class="rate" id="rate">Loading...</div>
<div class="result" id="result">—</div>
<div class="updated" id="updated"></div>
</div>

</div>

</div>

<script>

const currencies = [
"USD","CAD","EUR","GBP","AUD","NZD","JPY","CNY",
"CHF","SEK","NOK","DKK","CZK","PLN","HUF","THB",
"MXN","SGD","HKD","AED","INR","BRL","ZAR","TRY",
"KRW","IDR","PHP","RON","BGN","ILS"
];

const fromSelect = document.getElementById("from");
const toSelect = document.getElementById("to");

currencies.forEach(currency => {

fromSelect.innerHTML +=
`<option value="${currency}">${currency}</option>`;

toSelect.innerHTML +=
`<option value="${currency}">${currency}</option>`;

});

fromSelect.value = "CAD";
toSelect.value = "EUR";

async function convertCurrency(){

const amount =
parseFloat(document.getElementById("amount").value) || 1;

const from = fromSelect.value;
const to = toSelect.value;

if(from === to){

document.getElementById("rate").innerHTML =
`1 ${from} = 1 ${to}`;

document.getElementById("result").innerHTML =
`${amount.toFixed(2)} ${to}`;

return;

}

try{

const response = await fetch(
`https://open.er-api.com/v6/latest/${from}`
);

const data = await response.json();

const rate = data.rates[to];

const converted = amount * rate;

document.getElementById("rate").innerHTML =
`1 ${from} = ${rate.toFixed(4)} ${to}`;

document.getElementById("result").innerHTML =
`${converted.toFixed(2)} ${to}`;

document.getElementById("updated").innerHTML =
`Last updated: ${data.time_last_update_utc}`;

}
catch(error){

document.getElementById("rate").innerHTML =
error.toString();

document.getElementById("result").innerHTML =
"ERROR";

}

}

function swapCurrencies(){

const temp = fromSelect.value;

fromSelect.value = toSelect.value;
toSelect.value = temp;

convertCurrency();

}

document.getElementById("amount")
.addEventListener("input",convertCurrency);

fromSelect.addEventListener("change",convertCurrency);
toSelect.addEventListener("change",convertCurrency);

convertCurrency();

</script>

</body>
</html>
